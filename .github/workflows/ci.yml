name: 🤖 CI

on: [push, pull_request, workflow_dispatch]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  format:
    name: 🔤 Oxfmt
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 💅 Format check
        run: pnpm run format:check

  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔬 Lint
        run: pnpm run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🛠️ Build
        run: pnpm run build

      - name: 🔎 Type check
        run: pnpm run typecheck

      - name: 📦 Are the types wrong?
        run: pnpm dlx @arethetypeswrong/cli --pack --format table --profile esm-only

  test:
    name: 🩺 Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: ⚡ Vitest with coverage
        run: pnpm run test:coverage

      - name: ☂ Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true

  playwright:
    name: 🎭 Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🔢 Get Playwright version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | tr ' ' '-')" >> $GITHUB_ENV

      - name: 📦 Cache Playwright binaries
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: 📥 Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: 🎭 Playwright tests
        run: pnpm run test:browser:run

      - name: 📊 Upload report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright/report/
          retention-days: 30

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, test, playwright]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v5

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: ".nvmrc"

      - name: 📥 Install deps
        run: pnpm install

      - name: 🦋 Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run changeset:version
          publish: pnpm run changeset:publish
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
